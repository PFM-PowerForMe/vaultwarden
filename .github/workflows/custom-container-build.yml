name: Custom-Container-build
permissions: {}

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:  # click the button on Github repo!
  workflow_call:

jobs:
  Custom-Container-build:
    name: Base-${{ matrix.base_image }}
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      matrix:
        base_image: ['debian', 'alpine']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: workflow
          persist-credentials: false
          fetch-depth: 0

      - name: Initialize QEMU binfmt support
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-binary: false
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
          driver-opts: |
            network=host

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: ./docker/Dockerfile.${{ matrix.base_image }}
          push: true
          tags: |
            ${{ vars.DOCKERHUB_REPO }}:custom-latest-${{ matrix.base_image }}
            ${{ vars.GHCR_REPO }}:custom-latest-${{ matrix.base_image }}

      - name: Install and configure the Koyeb CLI
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: ${{ secrets.KOYEB_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}