name: Container Check templates
permissions: {}

on:
  workflow_dispatch:  # click the button on Github repo!
  workflow_call:

jobs:
  docker-templates:	
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      # Checkout the repo
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
      # End Checkout the repo

      - name: Run make to rebuild templates
        working-directory: docker
        run: make 

      - name: Check for unstaged changes
        working-directory: docker
        run: git diff --exit-code
        continue-on-error: false

      # Checkout the repo
      - name: "Checkout to workflow branch"
        uses: actions/checkout@v4
        with:
          ref: workflow
          persist-credentials: false
          fetch-depth: 0
      # End Checkout the repo

      - name: "Next workflow"
        if: ${{ success() }}
        run: pwd && echo $HOME && ls -al && ls -al ./.github/workflows
